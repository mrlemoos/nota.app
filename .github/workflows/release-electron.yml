name: Release Electron (macOS)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver for this build (e.g. 1.2.3), written to apps/nota-electron/package.json'
        required: true
        type: string

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-latest
    environment: Production
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set Electron package version from tag or input
        working-directory: apps/nota-electron
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Prepare Apple code signing (optional)
        id: signing
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_BASE64" ]; then
            exit 0
          fi
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/nota-certificate.p12"
          security create-keychain -p actions nota-build.keychain
          security default-keychain -s nota-build.keychain
          security unlock-keychain -p actions nota-build.keychain
          security set-keychain-settings -lut 21600 nota-build.keychain
          security import "$RUNNER_TEMP/nota-certificate.p12" -k nota-build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions nota-build.keychain
          echo "csc_link=$RUNNER_TEMP/nota-certificate.p12" >> "$GITHUB_OUTPUT"

      - name: Verify Vite client env (fail fast)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ] || [ -z "$VITE_CLERK_PUBLISHABLE_KEY" ]; then
            echo '::error::VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY, and VITE_CLERK_PUBLISHABLE_KEY must be set for the Production environment (or as repository secrets). Exact names; Variables need vars.* in the workflow — see apps/nota-electron/README.md.'
            exit 1
          fi

      - name: Build web app and publish Electron release
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          VITE_NOTA_SERVER_API_URL: ${{ secrets.VITE_NOTA_SERVER_API_URL }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          CSC_LINK_VALUE='${{ steps.signing.outputs.csc_link }}'
          if [ -n "$CSC_LINK_VALUE" ]; then
            export CSC_LINK="$CSC_LINK_VALUE"
            export CSC_KEY_PASSWORD='${{ secrets.APPLE_CERTIFICATE_PASSWORD }}'
          fi
          npx nx run @nota.app/nota-electron:electron:release
