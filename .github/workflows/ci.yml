name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: .pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: corepack enable pnpm
      - run: pnpm install --frozen-lockfile
      - name: ESLint
        run: pnpm exec nx run-many -t lint --outputStyle=static

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: .pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: corepack enable pnpm && pnpm install --frozen-lockfile

      - name: pnpm audit (informational)
        continue-on-error: true
        run: pnpm audit

      - name: Test web app
        run: pnpm exec nx run @nota.app/nota.app:test --outputStyle=static
        env:
          CI: 'true'

      - name: Build web app and marketing site
        run: pnpm exec nx run-many -t build --projects=@nota.app/nota.app,@nota.app/nota-marketing --outputStyle=static
        env:
          CI: 'true'
