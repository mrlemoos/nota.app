<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" fill="none">
  <style>
    .back {
      fill: #171717;
      fill-opacity: 0.35;
    }
    .mid {
      fill: #171717;
      fill-opacity: 0.7;
    }
    .front {
      fill: #171717;
      fill-opacity: 1;
    }
    @media (prefers-color-scheme: dark) {
      .back,
      .mid,
      .front {
        fill: #fafafa;
      }
    }
  </style>
  <rect class="back" x="4" y="4" width="30" height="30" rx="5.5" />
  <rect class="mid" x="7" y="7" width="30" height="30" rx="5.5" />
  <rect class="front" x="10" y="10" width="30" height="30" rx="5.5" />
</svg>
