appId: app.nota.desktop
productName: Nota
electronVersion: 35.7.5
publish:
  provider: github
  owner: mrlemoos
  repo: nota.app
directories:
  output: release
  buildResources: buildResources
files:
  - dist/**/*
  - from: ../nota.app/build
    to: nota.app/build
    filter:
      - "**/*"
  - from: ../nota.app/node_modules
    to: nota.app/node_modules
    filter:
      - "**/*"
mac:
  entitlements: buildResources/entitlements.mac.plist
  entitlementsInherit: buildResources/entitlements.mac.plist
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  hardenedRuntime: true
  # When CSC_* env vars and APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID are set in CI, set to true for notarisation.
  notarize: false
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
